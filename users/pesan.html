<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>

<body class="bg-blue-50 text-gray-800">

<main class="max-w-[480px] mx-auto min-h-screen bg-white shadow-xl flex flex-col">

<!-- HEADER -->
<header class="flex items-center gap-3 px-4 py-4 border-b">
    <button onclick="history.back()" class="text-blue-600">
        <i class="ph ph-arrow-left text-xl"></i>
    </button>
    <h1 class="font-semibold text-lg">Order</h1>
</header>

<!-- CONTENT -->
<div class="flex-1 overflow-y-auto px-4 py-4 space-y-5 pb-32">

    <!-- ORDER TYPE -->
    <div class="border border-blue-200 rounded-xl p-3 flex justify-between items-center">
        <span class="text-sm text-gray-500">Order Type</span>
        <span class="font-semibold text-blue-600 flex items-center gap-1">
            Pick Up <i class="ph ph-check-circle"></i>
        </span>
    </div>

    <!-- PICKUP -->
    <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 flex items-center gap-2">
        <i class="ph ph-clock text-blue-500"></i>
        <span class="text-sm font-medium">Pick Up Now</span>
    </div>

    <!-- RELATED MENU -->
    <div>
        <h2 class="font-semibold mb-3">Related Menu</h2>
        <div class="flex gap-3 overflow-x-auto">

            <div class="bg-white border rounded-xl p-2 min-w-[150px] shadow-sm">
                <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d" class="rounded-lg h-20 w-full object-cover">
                <p class="text-sm font-semibold mt-2">MIE GACOAN</p>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-blue-600 text-sm">Rp10.000</span>
                    <button class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                        +
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- ORDER LIST -->
    <div>
        <div class="flex justify-between items-center mb-3">
            <h2 class="font-semibold">Ordered Items</h2>
            <button class="text-sm text-blue-600 border px-3 py-1 rounded-lg">+ Add Item</button>
        </div>

        <div id="order-list" class="space-y-4"></div>
    </div>

</div>

<!-- FOOTER -->
<div class="fixed bottom-0 w-full max-w-[480px] left-1/2 -translate-x-1/2 bg-white border-t p-4">

    <div class="flex justify-between mb-3">
        <span class="text-gray-500 text-sm">Total Payment</span>
        <span id="total-price" class="font-bold text-lg text-blue-600">Rp0</span>
    </div>

    <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">
        Continue to Payment
    </button>

</div>

</main>

<script src="menu-data.js"></script>
<script>

function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
}

function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function formatRupiah(num) {
    return "Rp" + num.toLocaleString("id-ID");
}

function renderOrder() {
    const cart = getCart();
    const container = document.getElementById("order-list");

    if (!cart.length) {
        container.innerHTML = `<p class="text-center text-gray-400">Keranjang kosong</p>`;
        return;
    }

    let total = 0;

    container.innerHTML = "";

    cart.forEach(item => {
        const menu = MENU_DATA.find(m => m.id === item.id);
        const subtotal = menu.price * item.qty;
        total += subtotal;

        const el = document.createElement("div");
        el.className = "border rounded-xl p-3";

        el.innerHTML = `
            <div class="flex justify-between items-center">
                <h3 class="font-semibold text-sm">${menu.name}</h3>
                <button class="text-xs text-gray-500 border px-2 py-1 rounded">Edit</button>
            </div>

            <p class="text-xs text-gray-400 mt-1">No notes yet</p>

            <div class="flex justify-between items-center mt-2">
                <span class="text-blue-600 font-semibold text-sm">${formatRupiah(subtotal)}</span>

                <div class="flex items-center gap-2">
                    <button onclick="changeQty('${item.id}', -1)" class="w-7 h-7 bg-blue-100 rounded-full">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty('${item.id}', 1)" class="w-7 h-7 bg-blue-600 text-white rounded-full">+</button>
                </div>
            </div>
        `;

        container.appendChild(el);
    });

    document.getElementById("total-price").innerText = formatRupiah(total);
}

function changeQty(id, delta) {
    let cart = getCart();
    const item = cart.find(i => i.id === id);

    if (!item) return;

    item.qty += delta;

    if (item.qty <= 0) {
        cart = cart.filter(i => i.id !== id);
    }

    saveCart(cart);
    renderOrder();
}

document.addEventListener("DOMContentLoaded", renderOrder);

</script>

</body>
</html>
